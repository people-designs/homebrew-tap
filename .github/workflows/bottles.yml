name: Build Bottles

on:
  push:
    paths: ['Formula/mupdf@1.25.rb']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.bottle_tag }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            bottle_tag: arm64_sequoia
          - os: macos-14
            bottle_tag: arm64_sonoma

    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Tap this repo
        run: brew tap people-designs/tap https://github.com/people-designs/homebrew-tap

      - name: Install from source (for bottling)
        run: brew install --build-bottle people-designs/tap/mupdf@1.25

      - name: Create bottle
        run: brew bottle people-designs/tap/mupdf@1.25

      - uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.bottle_tag }}
          path: "*.tar.gz"

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@main

      - uses: actions/download-artifact@v4
        with:
          pattern: bottle-*
          merge-multiple: true
          path: bottles

      - name: Upload bottles to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "mupdf@1.25" \
            --title "mupdf@1.25 bottles" \
            --notes "Pre-built bottles" \
            bottles/*.tar.gz 2>/dev/null || \
          gh release upload "mupdf@1.25" bottles/*.tar.gz --clobber

      - name: Update formula with bottle SHA256s
        run: |
          ROOT_URL="https://github.com/${{ github.repository }}/releases/download/mupdf@1.25"
          cd bottles
          for f in *.tar.gz; do
            tag=$(echo "$f" | sed 's/.*\.\(arm64_[a-z]*\|[a-z]*\)\.bottle\..*/\1/')
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "$tag $sha"
            sed -i "s|sha256 cellar: :any, ${tag}:.*|sha256 cellar: :any, ${tag}: \"${sha}\"|" \
              "$GITHUB_WORKSPACE/Formula/mupdf@1.25.rb"
          done

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "mupdf@1.25: update bottle SHA256s"
          title: "mupdf@1.25: update bottle SHA256s"
          branch: "bottles/mupdf-at-1.25"
